name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Next.js app
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm run start -- --hostname 0.0.0.0 --port 3000 &
          npx wait-on http://127.0.0.1:3000

      - name: Release QA
        run: npm run qa:release

      - name: Smoke QA
        run: npm run qa:smoke
